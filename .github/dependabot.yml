version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - agent-pr
    commit-message:
      prefix: deps
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
